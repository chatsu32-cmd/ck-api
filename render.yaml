services:
  - type: web
    name: ck-api
    runtime: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NOTIFY_METHOD
        value: none
      - key: DATABASE_URL
        fromDatabase:
          name: ck-db
          property: connectionString

databases:
  - name: ck-db
    databaseName: ck
    user: ck_user
